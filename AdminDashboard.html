<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --primary:#2563eb;
      --primary2:#60a5fa;
      --success:#16a34a;
      --danger:#ef4444;
      --warning:#f59e0b;
      --purple:#7c3aed;
      --shadow:0 10px 30px rgba(15,23,42,.06);
      --radius:22px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%, #f5f7fb 120px, #f4f7fb 100%);
      color:var(--text);
    }

    .admin-shell{
      display:grid;
      grid-template-columns: 280px 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:rgba(255,255,255,.88);
      backdrop-filter: blur(12px);
      border-right:1px solid var(--line);
      padding:24px 18px;
      position:sticky;
      top:0;
      height:100vh;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      padding:8px 10px 18px 10px;
      margin-bottom:8px;
    }

    .brand-icon{
      width:58px;
      height:58px;
      border-radius:18px;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      box-shadow:0 14px 30px rgba(37,99,235,.25);
      flex-shrink:0;
    }

    .brand h1{
      margin:0;
      font-size:26px;
      line-height:1.05;
    }

    .brand p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .nav{
      margin-top:10px;
    }

    .nav-btn{
      width:100%;
      display:flex;
      align-items:center;
      gap:12px;
      border:none;
      background:transparent;
      color:#1e293b;
      text-align:left;
      padding:14px 16px;
      border-radius:16px;
      font-size:16px;
      cursor:pointer;
      margin-bottom:8px;
      transition:.2s ease;
    }

    .nav-btn .ico{
      width:22px;
      text-align:center;
      font-size:18px;
    }

    .nav-btn:hover{
      background:#eff6ff;
      color:var(--primary);
    }

    .nav-btn.active{
      background:linear-gradient(135deg,#eaf2ff,#eef6ff);
      color:var(--primary);
      font-weight:700;
      box-shadow:inset 0 0 0 1px #dbeafe;
    }

    .sidebar-footer{
      position:absolute;
      left:18px;
      right:18px;
      bottom:20px;
    }

    .logout-btn{
      width:100%;
      border:none;
      background:#fee2e2;
      color:#dc2626;
      padding:14px 16px;
      border-radius:16px;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
    }

    .logout-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(239,68,68,.12);
    }

    .main{
      padding:26px;
    }

    .hero{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      border-radius:32px;
      padding:28px 30px;
      box-shadow:0 20px 40px rgba(37,99,235,.22);
      margin-bottom:22px;
    }

    .hero h2{
      margin:0;
      font-size:34px;
      line-height:1.1;
    }

    .hero p{
      margin:10px 0 0;
      font-size:18px;
      opacity:.96;
    }

    .content{
      min-height:200px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:18px;
      margin-bottom:22px;
    }

    .stat-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:20px;
      display:flex;
      align-items:center;
      gap:14px;
      min-height:110px;
    }

    .stat-icon{
      width:54px;
      height:54px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      flex-shrink:0;
    }

    .bg-blue{ background:#dbeafe; }
    .bg-green{ background:#dcfce7; }
    .bg-orange{ background:#ffedd5; }
    .bg-purple{ background:#ede9fe; }

    .stat-body{
      flex:1;
      min-width:0;
    }

    .stat-label{
      font-size:13px;
      color:var(--muted);
      margin:0 0 6px;
    }

    .stat-value{
      margin:0;
      font-size:30px;
      font-weight:800;
      line-height:1.1;
      word-break:break-word;
    }

    .stat-value.small-money{
      font-size:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:22px;
    }

    .quick-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:18px;
    }

    .quick-card{
      cursor:pointer;
      transition:.2s ease;
    }

    .quick-card:hover{
      transform:translateY(-3px);
      box-shadow:0 16px 34px rgba(15,23,42,.09);
    }

    .quick-card h3{
      margin:0 0 10px;
      font-size:18px;
    }

    .quick-card p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      margin-bottom:18px;
    }

    .section-head h3{
      margin:0;
      font-size:24px;
    }

    .section-head p{
      margin:8px 0 0;
      color:var(--muted);
    }

    .search-row{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      margin-bottom:18px;
    }

    input, textarea{
      width:100%;
      padding:14px 15px;
      border:1px solid #cbd5e1;
      border-radius:14px;
      outline:none;
      font-size:15px;
      background:#fff;
    }

    input:focus, textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    label{
      display:block;
      margin:0 0 8px;
      font-size:14px;
      font-weight:700;
      color:#334155;
    }

    .btn{
      border:none;
      background:var(--primary);
      color:#fff;
      border-radius:14px;
      padding:13px 18px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      transition:.2s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 24px rgba(37,99,235,.18);
    }

    .btn-secondary{
      background:#e2e8f0;
      color:#334155;
    }

    .btn-danger{
      background:var(--danger);
      color:#fff;
    }

    .btn-small{
      padding:10px 14px;
      font-size:14px;
    }

    .btn-full{
      width:100%;
      margin-top:14px;
    }

    .result-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:14px;
    }

    .data-card{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
    }

    .data-card h4{
      margin:0 0 8px;
      font-size:18px;
    }

    .data-card p{
      margin:6px 0;
      color:var(--muted);
    }

    .vehicle-card{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      margin-top:12px;
    }

    .vehicle-card h4{
      margin:0;
      font-size:17px;
    }

    .vehicle-card p{
      margin:6px 0 0;
      color:var(--muted);
    }

    .form-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:18px;
    }

    .field{
      margin-bottom:14px;
    }

    .form-actions{
      display:flex;
      justify-content:flex-end;
      gap:12px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    .sparepart-row{
      display:grid;
      grid-template-columns: 1.5fr .7fr 1fr 44px;
      gap:10px;
      align-items:center;
      margin-bottom:10px;
    }

    .remove-btn{
      border:none;
      border-radius:12px;
      height:44px;
      background:#fee2e2;
      color:#dc2626;
      font-size:22px;
      cursor:pointer;
    }

    .table-wrap{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
    }

    th, td{
      padding:12px 10px;
      border-bottom:1px solid var(--line);
      text-align:left;
      font-size:14px;
    }

    th{
      background:#f8fafc;
      color:#334155;
      font-weight:700;
    }

    .empty{
      padding:16px;
      background:#f8fafc;
      border:1px dashed #cbd5e1;
      color:var(--muted);
      border-radius:16px;
    }

    @media (max-width: 1100px){
      .stats-grid{
        grid-template-columns: repeat(2, minmax(0,1fr));
      }
      .quick-grid{
        grid-template-columns:1fr;
      }
      .result-grid{
        grid-template-columns: repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width: 900px){
      .admin-shell{
        grid-template-columns: 1fr;
      }

      .sidebar{
        position:relative;
        height:auto;
        border-right:none;
        border-bottom:1px solid var(--line);
      }

      .sidebar-footer{
        position:static;
        margin-top:16px;
      }

      .main{
        padding:18px;
      }

      .hero h2{
        font-size:28px;
      }

      .search-row,
      .form-grid,
      .result-grid,
      .stats-grid{
        grid-template-columns:1fr;
      }

      .vehicle-card{
        flex-direction:column;
        align-items:flex-start;
      }

      .sparepart-row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body onload="adminInit()">
  <div class="admin-shell">

    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🔧</div>
        <div>
          <h1>Workshop</h1>
          <p>Admin Panel</p>
        </div>
      </div>

      <div class="nav">
        <button class="nav-btn active" onclick="openDashboard(this)">
          <span class="ico">🏠</span> <span>Dashboard</span>
        </button>

        <button class="nav-btn" onclick="openCustomers(this)">
          <span class="ico">👥</span> <span>Pelanggan</span>
        </button>

        <button class="nav-btn" onclick="openVehicles(this)">
          <span class="ico">🛵</span> <span>Kendaraan</span>
        </button>

        <button class="nav-btn" onclick="openServices(this)">
          <span class="ico">🧾</span> <span>Servis</span>
        </button>

        <button class="nav-btn" onclick="openReminder(this)">
          <span class="ico">🔔</span> <span>Reminder</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <button class="logout-btn" onclick="adminLogout()">Logout</button>
      </div>
    </aside>

    <main class="main">
      <div class="hero">
        <h2 id="pageTitle">Admin Dashboard</h2>
        <p id="pageSubtitle">Ringkasan aktivitas workshop kamu.</p>
      </div>

      <div id="adminContent" class="content"></div>
    </main>

  </div>

  <script>
    let selectedCustomerId = "";
    let selectedVehicleId = "";

    function adminInit() {
      openDashboard(document.querySelector(".nav-btn"));
    }

    function setActive(btn) {
      document.querySelectorAll(".nav-btn").forEach(el => el.classList.remove("active"));
      if (btn) btn.classList.add("active");
    }

    function setPage(title, subtitle) {
      document.getElementById("pageTitle").innerText = title;
      document.getElementById("pageSubtitle").innerText = subtitle;
    }

    function rupiah(val) {
      return "Rp " + Number(val || 0).toLocaleString("id-ID");
    }

    function openDashboard(btn) {
      setActive(btn);
      setPage("Admin Dashboard", "Ringkasan aktivitas workshop kamu.");

      document.getElementById("adminContent").innerHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon bg-blue">👥</div>
            <div class="stat-body">
              <p class="stat-label">Total Pelanggan</p>
              <h3 class="stat-value" id="statCustomers">-</h3>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon bg-green">🛵</div>
            <div class="stat-body">
              <p class="stat-label">Total Kendaraan</p>
              <h3 class="stat-value" id="statVehicles">-</h3>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon bg-orange">🧾</div>
            <div class="stat-body">
              <p class="stat-label">Total Servis</p>
              <h3 class="stat-value" id="statServices">-</h3>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon bg-purple">💰</div>
            <div class="stat-body">
              <p class="stat-label">Total Pendapatan</p>
              <h3 class="stat-value small-money" id="statRevenue">-</h3>
            </div>
          </div>
        </div>

        <div class="quick-grid">
          <div class="card quick-card" onclick="openAddCustomer()">
            <h3>Tambah Pelanggan</h3>
            <p>Daftarkan pelanggan dan kendaraan baru dengan cepat.</p>
          </div>

          <div class="card quick-card" onclick="openServices()">
            <h3>Input Servis</h3>
            <p>Buat transaksi servis baru lengkap dengan sparepart.</p>
          </div>

          <div class="card quick-card" onclick="openCustomers()">
            <h3>Data Pelanggan</h3>
            <p>Lihat seluruh pelanggan dan kendaraan yang terdaftar.</p>
          </div>
        </div>
      `;

      google.script.run
        .withSuccessHandler(function(data) {
          document.getElementById("statCustomers").innerText = data.customers;
          document.getElementById("statVehicles").innerText = data.vehicles;
          document.getElementById("statServices").innerText = data.services;
          document.getElementById("statRevenue").innerText = rupiah(data.revenue);
        })
        .withFailureHandler(function(err) {
          alert("Gagal memuat statistik: " + err.message);
        })
        .adminGetStats();
    }

    function openCustomers(btn) {
      setActive(btn);
      setPage("Pelanggan", "Kelola data pelanggan workshop.");

      document.getElementById("adminContent").innerHTML = `
        <div class="card">
          <div class="section-head">
            <div>
              <h3>Daftar Pelanggan</h3>
              <p>Cari, lihat, atau tambah pelanggan baru.</p>
            </div>
            <button class="btn btn-small" onclick="openAddCustomer()">+ Tambah</button>
          </div>

          <div class="search-row">
            <input id="customerKeyword" placeholder="Cari nama / nomor HP">
            <button class="btn" onclick="searchCustomersAdmin()">Cari</button>
          </div>

          <div id="customerResult" class="result-grid"></div>
        </div>
      `;

      loadCustomersAdmin();
    }

    function loadCustomersAdmin() {
      google.script.run
        .withSuccessHandler(renderCustomers)
        .withFailureHandler(function(err) {
          alert("Gagal memuat pelanggan: " + err.message);
        })
        .adminGetCustomers();
    }

    function searchCustomersAdmin() {
      const keyword = document.getElementById("customerKeyword").value || "";
      google.script.run
        .withSuccessHandler(renderCustomers)
        .withFailureHandler(function(err) {
          alert("Gagal mencari pelanggan: " + err.message);
        })
        .adminSearchCustomers(keyword);
    }

    function renderCustomers(data) {
      let html = "";

      if (!data || data.length === 0) {
        html = `<div class="empty">Belum ada data pelanggan.</div>`;
      } else {
        data.forEach(c => {
          html += `
            <div class="data-card">
              <h4>${c.nama}</h4>
              <p>📱 ${c.hp}</p>
              <p>📍 ${c.alamat || "-"}</p>
              <button class="btn btn-small" onclick="showCustomerVehicles('${c.customerId}')">Lihat Kendaraan</button>
            </div>
          `;
        });
      }

      document.getElementById("customerResult").innerHTML = html;
    }

    function openAddCustomer() {
      setPage("Tambah Pelanggan", "Daftarkan pelanggan dan kendaraan baru.");

      document.getElementById("adminContent").innerHTML = `
        <div class="card">
          <h3 style="margin-top:0;">Data Pelanggan</h3>

          <div class="form-grid">
            <div class="field">
              <label>Nama Pelanggan</label>
              <input id="namaCustomer" placeholder="Contoh: Vicky">
            </div>
            <div class="field">
              <label>Nomor HP</label>
              <input id="hpCustomer" placeholder="Contoh: 08123456789">
            </div>
          </div>

          <div class="field">
            <label>Alamat</label>
            <input id="alamatCustomer" placeholder="Alamat pelanggan">
          </div>

          <h3>Data Kendaraan</h3>

          <div class="form-grid">
            <div class="field">
              <label>Merk</label>
              <input id="merkKendaraan" placeholder="Contoh: Yamaha">
            </div>
            <div class="field">
              <label>Tipe</label>
              <input id="tipeKendaraan" placeholder="Contoh: Mio">
            </div>
          </div>

          <div class="field">
            <label>Plat Nomor</label>
            <input id="platKendaraan" placeholder="Contoh: AD4557DH">
          </div>

          <div class="form-actions">
            <button class="btn btn-secondary" onclick="openCustomers()">Batal</button>
            <button class="btn" onclick="saveCustomerVehicleAdmin()">Simpan</button>
          </div>
        </div>
      `;
    }

    function saveCustomerVehicleAdmin() {
      const data = {
        nama: document.getElementById("namaCustomer").value.trim(),
        hp: document.getElementById("hpCustomer").value.trim(),
        alamat: document.getElementById("alamatCustomer").value.trim(),
        merk: document.getElementById("merkKendaraan").value.trim(),
        tipe: document.getElementById("tipeKendaraan").value.trim(),
        plat: document.getElementById("platKendaraan").value.trim()
      };

      if (!data.nama || !data.hp || !data.plat) {
        alert("Nama, nomor HP, dan plat wajib diisi.");
        return;
      }

      google.script.run
        .withSuccessHandler(function() {
          alert("Pelanggan berhasil disimpan.");
          openCustomers();
        })
        .withFailureHandler(function(err) {
          alert("Gagal menyimpan pelanggan: " + err.message);
        })
        .adminAddCustomerWithVehicle(data);
    }

    function openVehicles(btn) {
      setActive(btn);
      setPage("Kendaraan", "Kelola kendaraan pelanggan.");

      document.getElementById("adminContent").innerHTML = `
        <div class="card">
          <div class="section-head">
            <div>
              <h3>Pilih Pelanggan</h3>
              <p>Cari pelanggan untuk melihat atau menambah kendaraan.</p>
            </div>
          </div>

          <div class="search-row">
            <input id="vehicleCustomerKeyword" placeholder="Cari nama / nomor HP">
            <button class="btn" onclick="searchCustomerForVehicle()">Cari</button>
          </div>

          <div id="vehicleCustomerResult" class="result-grid"></div>
          <div id="vehicleResult" style="margin-top:18px;"></div>
        </div>
      `;
    }

    function searchCustomerForVehicle() {
      const keyword = document.getElementById("vehicleCustomerKeyword").value || "";

      google.script.run
        .withSuccessHandler(function(data) {
          let html = "";
          if (!data || data.length === 0) {
            html = `<div class="empty">Pelanggan tidak ditemukan.</div>`;
          } else {
            data.forEach(c => {
              html += `
                <div class="data-card">
                  <h4>${c.nama}</h4>
                  <p>📱 ${c.hp}</p>
                  <button class="btn btn-small" onclick="showCustomerVehicles('${c.customerId}')">Pilih</button>
                </div>
              `;
            });
          }
          document.getElementById("vehicleCustomerResult").innerHTML = html;
        })
        .withFailureHandler(function(err) {
          alert("Gagal mencari pelanggan: " + err.message);
        })
        .adminSearchCustomers(keyword);
    }

function showCustomerVehicles(customerId) {
  selectedCustomerId = customerId;

  google.script.run
    .withSuccessHandler(function(data) {
      let html = `
        <div class="card">
          <div class="section-head">
            <div>
              <h3>Daftar Kendaraan</h3>
              <p>Kendaraan milik pelanggan terpilih.</p>
            </div>
          </div>
      `;

      if (!data || data.length === 0) {
        html += `<div class="empty">Belum ada kendaraan.</div>`;
      } else {
        data.forEach(v => {
          html += `
            <div class="vehicle-card">
              <div>
                <h4>${v.merk} ${v.tipe}</h4>
                <p>Plat: ${v.noPolisi}</p>
              </div>

              <button class="btn btn-small" onclick="showVehicleServiceHistory('${v.vehicleId}')">
                Riwayat Servis
              </button>
            </div>
          `;
        });
      }

      html += `
        </div>

        <div id="vehicleServiceHistory" style="margin-top:18px;"></div>
      `;

      const target =
        document.getElementById("vehicleResult") ||
        document.getElementById("customerResult");

      target.innerHTML = html;
    })
    .withFailureHandler(function(err) {
      alert("Gagal memuat kendaraan: " + err.message);
    })
    .adminGetVehiclesByCustomer(customerId);
}

function showVehicleServiceHistory(vehicleId) {
  google.script.run
    .withSuccessHandler(function(data) {
      let html = `
        <div class="card">
          <div class="section-head">
            <div>
              <h3>Riwayat Servis</h3>
              <p>Daftar servis untuk kendaraan yang dipilih.</p>
            </div>
          </div>
      `;

      if (!data || data.length === 0) {
        html += `<div class="empty">Belum ada riwayat servis untuk kendaraan ini.</div>`;
      } else {
        html += `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Tanggal</th>
                  <th>KM</th>
                  <th>Keluhan</th>
                  <th>Diagnosa</th>
                  <th>Mekanik</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>
        `;

        data.forEach(s => {
          html += `
            <tr>
              <td>${s.tanggal}</td>
              <td>${s.km}</td>
              <td>${s.keluhan}</td>
              <td>${s.diagnosa}</td>
              <td>${s.mekanik}</td>
              <td>${rupiah(s.total)}</td>
            </tr>
          `;
        });

        html += `
              </tbody>
            </table>
          </div>
        `;
      }

      html += `</div>`;

      document.getElementById("vehicleServiceHistory").innerHTML = html;

      document
        .getElementById("vehicleServiceHistory")
        .scrollIntoView({ behavior: "smooth" });
    })
    .withFailureHandler(function(err) {
      alert("Gagal memuat riwayat servis: " + err.message);
    })
    .adminGetServiceHistoryByVehicle(vehicleId);
}

    function showAddVehicleForm(customerId) {
      selectedCustomerId = customerId;

      document.getElementById("vehicleResult").innerHTML = `
        <div class="card">
          <h3 style="margin-top:0;">Tambah Kendaraan</h3>

          <div class="field">
            <label>Merk</label>
            <input id="addMerk" placeholder="Contoh: Honda">
          </div>

          <div class="field">
            <label>Tipe</label>
            <input id="addTipe" placeholder="Contoh: Beat">
          </div>

          <div class="field">
            <label>Plat Nomor</label>
            <input id="addPlat" placeholder="Contoh: AD1234XX">
          </div>

          <div class="form-actions">
            <button class="btn btn-secondary" onclick="showCustomerVehicles('${customerId}')">Batal</button>
            <button class="btn" onclick="saveVehicleAdmin()">Simpan Kendaraan</button>
          </div>
        </div>
      `;
    }

    function saveVehicleAdmin() {
      const data = {
        customerId: selectedCustomerId,
        merk: document.getElementById("addMerk").value.trim(),
        tipe: document.getElementById("addTipe").value.trim(),
        plat: document.getElementById("addPlat").value.trim()
      };

      if (!data.customerId || !data.merk || !data.tipe || !data.plat) {
        alert("Semua data kendaraan wajib diisi.");
        return;
      }

      google.script.run
        .withSuccessHandler(function() {
          alert("Kendaraan berhasil ditambahkan.");
          showCustomerVehicles(selectedCustomerId);
        })
        .withFailureHandler(function(err) {
          alert("Gagal menyimpan kendaraan: " + err.message);
        })
        .adminAddVehicle(data);
    }

    function openServices(btn) {
      setActive(btn);
      setPage("Servis", "Input dan lihat riwayat servis.");

      selectedCustomerId = "";
      selectedVehicleId = "";

      document.getElementById("adminContent").innerHTML = `
        <div class="card">
          <div class="section-head">
            <div>
              <h3>Input Servis Baru</h3>
              <p>Pilih pelanggan, kendaraan, lalu isi detail servis.</p>
            </div>
            <button class="btn btn-small btn-secondary" onclick="loadServiceHistory()">Lihat Riwayat</button>
          </div>

          <div class="search-row">
            <input id="serviceCustomerKeyword" placeholder="Cari pelanggan">
            <button class="btn" onclick="searchCustomerForService()">Cari</button>
          </div>

          <div id="serviceCustomerResult" class="result-grid"></div>
          <div id="serviceVehicleResult" style="margin-top:18px;"></div>
        </div>

        <div class="card" style="margin-top:18px;">
          <h3 style="margin-top:0;">Detail Servis</h3>

          <div class="field">
            <label>KM Kendaraan</label>
            <input id="km" placeholder="Contoh: 12500">
          </div>

          <div class="field">
            <label>Keluhan</label>
            <textarea id="keluhan" placeholder="Keluhan pelanggan"></textarea>
          </div>

          <div class="field">
            <label>Diagnosa</label>
            <textarea id="diagnosa" placeholder="Hasil diagnosa"></textarea>
          </div>

          <div class="field">
            <label>Mekanik</label>
            <input id="mekanik" placeholder="Nama mekanik">
          </div>

          <div class="field">
            <label>Biaya Jasa</label>
            <input id="jasa" type="number" placeholder="Contoh: 50000">
          </div>

          <h3>Sparepart</h3>
          <div id="sparepartList"></div>

          <button class="btn btn-secondary" onclick="addSparepartRow()">+ Tambah Sparepart</button>
          <button class="btn btn-full" onclick="saveServiceAdmin()">Simpan Servis</button>
        </div>

        <div id="serviceHistoryArea" style="margin-top:18px;"></div>
      `;

      addSparepartRow();
    }

    function searchCustomerForService() {
      const keyword = document.getElementById("serviceCustomerKeyword").value || "";

      google.script.run
        .withSuccessHandler(function(data) {
          let html = "";

          if (!data || data.length === 0) {
            html = `<div class="empty">Pelanggan tidak ditemukan.</div>`;
          } else {
            data.forEach(c => {
              html += `
                <div class="data-card">
                  <h4>${c.nama}</h4>
                  <p>📱 ${c.hp}</p>
                  <button class="btn btn-small" onclick="selectCustomerForService('${c.customerId}')">Pilih</button>
                </div>
              `;
            });
          }

          document.getElementById("serviceCustomerResult").innerHTML = html;
        })
        .withFailureHandler(function(err) {
          alert("Gagal mencari pelanggan: " + err.message);
        })
        .adminSearchCustomers(keyword);
    }

    function selectCustomerForService(customerId) {
      selectedCustomerId = customerId;

      google.script.run
        .withSuccessHandler(function(data) {
          let html = `<div class="card"><h3 style="margin-top:0;">Pilih Kendaraan</h3>`;

          if (!data || data.length === 0) {
            html += `<div class="empty">Pelanggan ini belum punya kendaraan.</div>`;
          } else {
            data.forEach(v => {
              html += `
                <div class="vehicle-card">
                  <div>
                    <h4>${v.merk} ${v.tipe}</h4>
                    <p>Plat: ${v.noPolisi}</p>
                  </div>
                  <button class="btn btn-small" onclick="selectVehicleForService('${v.vehicleId}')">Pilih</button>
                </div>
              `;
            });
          }

          html += `</div>`;
          document.getElementById("serviceVehicleResult").innerHTML = html;
        })
        .withFailureHandler(function(err) {
          alert("Gagal memuat kendaraan: " + err.message);
        })
        .adminGetVehiclesByCustomer(customerId);
    }

    function selectVehicleForService(vehicleId) {
      selectedVehicleId = vehicleId;
      alert("Kendaraan dipilih untuk servis.");
    }

    function addSparepartRow() {
      const wrap = document.getElementById("sparepartList");
      const div = document.createElement("div");
      div.className = "sparepart-row";

      div.innerHTML = `
        <input class="spNama" placeholder="Nama sparepart">
        <input class="spQty" type="number" placeholder="Qty">
        <input class="spHarga" type="number" placeholder="Harga">
        <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
      `;

      wrap.appendChild(div);
    }

    function saveServiceAdmin() {
      if (!selectedCustomerId || !selectedVehicleId) {
        alert("Pilih pelanggan dan kendaraan terlebih dahulu.");
        return;
      }

      const items = [];
      document.querySelectorAll(".spNama").forEach((el, index) => {
        const nama = el.value.trim();
        const qty = Number(document.querySelectorAll(".spQty")[index].value || 0);
        const harga = Number(document.querySelectorAll(".spHarga")[index].value || 0);

        if (nama && qty > 0) {
          items.push({
            nama: nama,
            qty: qty,
            harga: harga,
            subtotal: qty * harga
          });
        }
      });

      const data = {
        customerId: selectedCustomerId,
        vehicleId: selectedVehicleId,
        km: document.getElementById("km").value,
        keluhan: document.getElementById("keluhan").value,
        diagnosa: document.getElementById("diagnosa").value,
        mekanik: document.getElementById("mekanik").value,
        jasa: document.getElementById("jasa").value,
        items: items
      };

      google.script.run
        .withSuccessHandler(function(serviceId) {
          alert("Servis berhasil disimpan. ID: " + serviceId);
          openDashboard(document.querySelectorAll(".nav-btn")[0]);
        })
        .withFailureHandler(function(err) {
          alert("Gagal menyimpan servis: " + err.message);
        })
        .saveService(data);
    }

    function loadServiceHistory() {
      google.script.run
        .withSuccessHandler(function(data) {
          let html = `
            <div class="card">
              <h3 style="margin-top:0;">Riwayat Servis</h3>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Tanggal</th>
                      <th>Pelanggan</th>
                      <th>Motor</th>
                      <th>Plat</th>
                      <th>Total</th>
                    </tr>
                  </thead>
                  <tbody>
          `;

          if (!data || data.length === 0) {
            html += `<tr><td colspan="5">Belum ada riwayat servis.</td></tr>`;
          } else {
            data.forEach(s => {
              html += `
                <tr>
                  <td>${s.tanggal}</td>
                  <td>${s.namaPelanggan}</td>
                  <td>${s.motor}</td>
                  <td>${s.plat}</td>
                  <td>${rupiah(s.total)}</td>
                </tr>
              `;
            });
          }

          html += `</tbody></table></div></div>`;
          document.getElementById("serviceHistoryArea").innerHTML = html;
        })
        .withFailureHandler(function(err) {
          alert("Gagal memuat riwayat servis: " + err.message);
        })
        .adminGetServiceHistory();
    }

    function openReminder(btn) {
      setActive(btn);
      setPage("Reminder", "Pengingat servis berikutnya.");

      document.getElementById("adminContent").innerHTML = `
        <div class="card">
          <div class="section-head">
            <div>
              <h3>Reminder Servis</h3>
              <p>Daftar kendaraan dengan servis terakhir.</p>
            </div>
          </div>
          <div id="reminderResult">Memuat reminder...</div>
        </div>
      `;

      google.script.run
        .withSuccessHandler(function(data) {
          let html = "";

          if (!data || data.length === 0) {
            html = `<div class="empty">Belum ada reminder.</div>`;
          } else {
            html = `
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Pelanggan</th>
                      <th>Motor</th>
                      <th>Plat</th>
                      <th>Tanggal Servis Terakhir</th>
                    </tr>
                  </thead>
                  <tbody>
            `;

            data.forEach(r => {
              html += `
                <tr>
                  <td>${r.namaPelanggan}</td>
                  <td>${r.motor}</td>
                  <td>${r.plat}</td>
                  <td>${r.tanggal}</td>
                </tr>
              `;
            });

            html += `</tbody></table></div>`;
          }

          document.getElementById("reminderResult").innerHTML = html;
        })
        .withFailureHandler(function(err) {
          alert("Gagal memuat reminder: " + err.message);
        })
        .adminGetReminders();
    }

    function adminLogout() {
      google.script.run
        .withSuccessHandler(function() {
          google.script.run
            .withSuccessHandler(function(url) {
              window.top.location.href = url;
            })
            .getWebAppUrl();
        })
        .logout();
    }
  </script>
</body>
</html>
