<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: #f4f7fb;
      font-family: Arial, sans-serif;
      color: #0f172a;
    }

    .page {
      padding: 34px;
      box-sizing: border-box;
    }

    .hero {
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      color: white;
      border-radius: 30px;
      padding: 34px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
      box-shadow: 0 18px 44px rgba(37, 99, 235, 0.22);
    }

    .hero h1 {
      margin: 0;
      font-size: 36px;
    }

    .hero p {
      margin: 8px 0 0;
      font-size: 17px;
      opacity: 0.95;
    }

    .logout-btn {
      border: none;
      background: rgba(255,255,255,0.18);
      color: white;
      padding: 14px 22px;
      border-radius: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 30px rgba(15,23,42,0.06);
    }

    .profile h2 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    .profile p {
      margin: 8px 0;
      color: #64748b;
    }

    .vehicle-box {
      background: #eff6ff;
      color: #2563eb;
      border-radius: 18px;
      padding: 14px;
      margin-top: 16px;
      font-weight: 700;
    }

    .invoice-head h2 {
      margin: 0;
      font-size: 26px;
    }

    .invoice-head p {
      margin: 8px 0 20px;
      color: #64748b;
    }

    .invoice-item {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 18px;
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      transition: 0.2s;
    }

    .invoice-item:hover {
      background: white;
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(15,23,42,0.08);
    }

    .invoice-left {
      flex: 1;
      min-width: 220px;
    }

    .invoice-title {
      font-weight: 800;
      font-size: 18px;
    }

    .invoice-sub {
      color: #64748b;
      margin-top: 5px;
      font-size: 14px;
    }

    .invoice-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .invoice-total {
      font-weight: 800;
      color: #2563eb;
      white-space: nowrap;
      font-size: 17px;
    }

    .btn {
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 14px;
      padding: 13px 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #334155;
    }

    .btn-wa {
      background: #16a34a;
    }

    .detail-card {
      margin-top: 24px;
      background: white;
      border-radius: 24px;
      padding: 30px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 30px rgba(15,23,42,0.06);
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 18px;
      margin-bottom: 22px;
    }

    .detail-header h2 {
      margin: 0;
      color: #2563eb;
      font-size: 28px;
    }

    .detail-header p {
      margin: 7px 0 0;
      color: #64748b;
    }

    .detail-section {
      margin-top: 24px;
    }

    .detail-section h3 {
      color: #234aa5;
      border-left: 5px solid #234aa5;
      padding-left: 10px;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid #d6ddea;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #f4f7ff;
    }

    .info-table td:first-child {
      width: 190px;
      font-weight: 700;
      color: #475569;
      background: #f8fafc;
    }

    .right {
      text-align: right;
    }

    .center {
      text-align: center;
    }

    tfoot td {
      font-weight: 800;
      background: #fafbff;
    }

    .empty,
    .error {
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
      color: #64748b;
    }

    .error {
      color: #dc2626;
      background: #fee2e2;
    }

    @media screen and (max-width: 900px) {
      .page {
        padding: 18px;
      }

      .hero,
      .invoice-item,
      .detail-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .detail-card {
        padding: 20px;
      }

      .invoice-actions {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <?
    var pageData;
    var loadError = "";

    try {
      pageData = getCustomerPageData();
    } catch (err) {
      loadError = err.message;
      pageData = {
        profile: {},
        invoices: []
      };
    }
  ?>

  <div class="page">
    <div class="hero">
      <div>
        <h1>Dashboard Customer</h1>
        <p>Lihat data kendaraan, invoice servis, dan download laporan PDF.</p>
      </div>

      <button class="logout-btn" onclick="logoutCustomer()">Logout</button>
    </div>

    <div class="layout">
      <aside>
        <div class="card profile">
          <? if (loadError) { ?>
            <div class="error"><?= loadError ?></div>
          <? } else { ?>
            <h2><?= pageData.profile.nama ?></h2>
            <p><b>No. HP:</b> <?= pageData.profile.hp ?></p>

            <div class="vehicle-box">
              <?= pageData.profile.kendaraan ?> <?= pageData.profile.tipe ?>
              <br>
              Plat: <?= pageData.profile.plat ?>
            </div>
          <? } ?>
        </div>
      </aside>

      <main>
        <div class="card">
          <div class="invoice-head">
            <h2>Invoice Servis</h2>
            <p>Klik tombol detail untuk melihat rincian servis.</p>
          </div>

          <div id="invoiceList">
            <? if (loadError) { ?>
              <div class="error">Gagal memuat invoice: <?= loadError ?></div>
            <? } else if (!pageData.invoices || pageData.invoices.length === 0) { ?>
              <div class="empty">Belum ada invoice servis.</div>
            <? } else { ?>
              <? for (var i = 0; i < pageData.invoices.length; i++) { ?>
                <div class="invoice-item">
                  <div class="invoice-left">
                    <div class="invoice-title">Invoice Servis</div>

                    <div class="invoice-sub">
                      Tanggal dibuat: <?= pageData.invoices[i].tanggalFormat ?>
                    </div>

                    <div class="invoice-sub">
                      KM: <?= pageData.invoices[i].km ?>
                    </div>
                  </div>

                  <div class="invoice-actions">
                    <div class="invoice-total">
                      Rp <?= Number(pageData.invoices[i].totalBiaya).toLocaleString("id-ID") ?>
                    </div>

<button class="btn" onclick="showInvoiceDetail(<?= i ?>)">
  Detail
</button>

<button
  class="btn btn-secondary"
  onclick='exportPdf(<?= JSON.stringify(String(pageData.invoices[i].serviceId)) ?>)'>
  PDF
</button>
                  </div>
                </div>
              <? } ?>
            <? } ?>
          </div>
        </div>

        <div id="invoiceDetail"></div>
      </main>
    </div>
  </div>

<script>
    const INVOICE_DATA = <?!= JSON.stringify(pageData.invoices || []) ?>;

    function rupiah(value) {
      return "Rp " + Number(value || 0).toLocaleString("id-ID");
    }

function showInvoiceDetail(index) {
  const data = INVOICE_DATA[index];

  if (!data) {
    document.getElementById("invoiceDetail").innerHTML = `
      <div class="detail-card">
        <div class="error">
          Data invoice tidak ditemukan di halaman. Index: ${index}
        </div>
      </div>
    `;
    return;
  }

  let itemRows = "";

  if (!data.items || data.items.length === 0) {
    itemRows = `
      <tr>
        <td colspan="4">Tidak ada sparepart.</td>
      </tr>
    `;
  } else {
    data.items.forEach(function(item) {
      itemRows += `
        <tr>
          <td>${item.nama}</td>
          <td class="center">${item.qty}</td>
          <td class="right">${rupiah(item.harga)}</td>
          <td class="right">${rupiah(item.subtotal)}</td>
        </tr>
      `;
    });
  }

  document.getElementById("invoiceDetail").innerHTML = `
    <div class="detail-card">

      <div class="detail-header">
        <div>
          <h2>INVOICE SERVIS</h2>
          <p>Tanggal dibuat: ${data.tanggalFormat}</p>
          <p>ID Servis: ${data.serviceId}</p>
        </div>

        <div class="invoice-actions">
          <button class="btn" onclick="exportPdf('${data.serviceId}')">
            Export PDF
          </button>

          <button class="btn btn-wa" onclick="sendWa('${data.serviceId}')">
            Kirim WA
          </button>
        </div>
      </div>

      <div class="detail-section">
        <h3>Informasi Bengkel</h3>
        <table class="info-table">
          <tr>
            <td>Nama Bengkel</td>
            <td>${data.namaBengkel}</td>
          </tr>
          <tr>
            <td>Tanggal</td>
            <td>${data.tanggalFormat}</td>
          </tr>
        </table>
      </div>

      <div class="detail-section">
        <h3>Informasi Pelanggan & Motor</h3>
        <table class="info-table">
          <tr>
            <td>Nama Pelanggan</td>
            <td>${data.namaPelanggan}</td>
          </tr>
          <tr>
            <td>No. HP</td>
            <td>${data.hp}</td>
          </tr>
          <tr>
            <td>Plat</td>
            <td>${data.plat}</td>
          </tr>
          <tr>
            <td>Merk</td>
            <td>${data.merk}</td>
          </tr>
          <tr>
            <td>Tipe</td>
            <td>${data.tipe}</td>
          </tr>
        </table>
      </div>

      <div class="detail-section">
        <h3>Detail Servis</h3>
        <table class="info-table">
          <tr>
            <td>KM</td>
            <td>${data.km}</td>
          </tr>
          <tr>
            <td>Keluhan</td>
            <td>${data.keluhan}</td>
          </tr>
          <tr>
            <td>Diagnosa</td>
            <td>${data.diagnosa}</td>
          </tr>
          <tr>
            <td>Mekanik</td>
            <td>${data.mekanik}</td>
          </tr>
        </table>
      </div>

      <div class="detail-section">
        <h3>Rincian Pengeluaran</h3>

        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th class="center">Qty</th>
              <th class="right">Harga</th>
              <th class="right">Subtotal</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>Jasa Servis</td>
              <td class="center">1</td>
              <td class="right">${rupiah(data.jasa)}</td>
              <td class="right">${rupiah(data.jasa)}</td>
            </tr>

            ${itemRows}
          </tbody>

          <tfoot>
            <tr>
              <td colspan="3">Total Sparepart</td>
              <td class="right">${rupiah(data.totalSparepart)}</td>
            </tr>
            <tr>
              <td colspan="3">Total Biaya</td>
              <td class="right">${rupiah(data.totalBiaya)}</td>
            </tr>
          </tfoot>
        </table>
      </div>

    </div>
  `;

  document.getElementById("invoiceDetail").scrollIntoView({
    behavior: "smooth"
  });
}

    function exportPdf(serviceId) {
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            window.open(res.url, "_blank");
          } else {
            alert("Gagal membuat PDF.");
          }
        })
        .withFailureHandler(function(error) {
          alert("Gagal export PDF: " + error.message);
        })
        .createInvoicePdf(serviceId);
    }

    function sendWa(serviceId) {
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            alert("Laporan berhasil dikirim ke WhatsApp.");
          } else {
            alert("Gagal kirim WhatsApp.");
          }
        })
        .withFailureHandler(function(error) {
          alert("Gagal kirim WhatsApp: " + error.message);
        })
        .sendServiceReport(serviceId);
    }

    function logoutCustomer() {
      google.script.run
        .withSuccessHandler(function() {
          google.script.run
            .withSuccessHandler(function(url) {
              window.top.location.href = url;
            })
            .getWebAppUrl();
        })
        .logout();
    }
  </script>
</body>
</html>
