<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <?!= include("CSS"); ?>
</head>

<body class="login-body">

  <div class="login-wrapper">

    <div class="login-card">

      <div class="login-logo">
        🔧
      </div>

      <h1>Workshop Service</h1>

      <p class="login-subtitle">
        Sistem servis kendaraan untuk admin dan customer
      </p>

      <div class="login-choice">
        <button type="button" class="btn login-btn" onclick="showAdmin()">
          Admin Login
        </button>

        <button type="button" class="btn login-btn outline-btn" onclick="showCustomer()">
          Customer Login
        </button>
      </div>

      <div id="form" class="login-form-area"></div>

    </div>

  </div>

  <script>
    function showAdmin() {
      document.getElementById("form").innerHTML = `
        <div class="form-box">
          <h3>Login Admin</h3>
          <p class="form-desc">Masuk menggunakan akun admin workshop.</p>

          <label>Username</label>
          <input id="adminUser" type="text" placeholder="Masukkan username">

          <label>Password</label>
          <input id="adminPass" type="password" placeholder="Masukkan password">

          <button type="button" class="btn full-btn" onclick="adminLogin()">
            Masuk sebagai Admin
          </button>
        </div>
      `;
    }

    function showCustomer() {
      document.getElementById("form").innerHTML = `
        <div class="form-box">
          <h3>Login Customer</h3>
          <p class="form-desc">Cek riwayat servis kendaraan kamu.</p>

          <label>Nomor HP</label>
          <input id="hp" type="text" placeholder="Contoh: 08123456789">

          <label>Plat Nomor</label>
          <input id="plat" type="text" placeholder="Contoh: AD4557DH">

          <button type="button" class="btn full-btn" onclick="customerLogin()">
            Masuk sebagai Customer
          </button>
        </div>
      `;
    }

    function adminLogin() {
      const username = document.getElementById("adminUser").value.trim();
      const password = document.getElementById("adminPass").value.trim();

      if (!username || !password) {
        alert("Username dan password wajib diisi");
        return;
      }

      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            google.script.run
              .withSuccessHandler(function(url) {
                window.top.location.href = url + "?page=admin";
              })
              .getWebAppUrl();
          } else {
            alert("Login admin gagal. Username atau password salah.");
          }
        })
        .withFailureHandler(function(error) {
          alert("Error login admin: " + error.message);
        })
        .loginAdmin(username, password);
    }

    function customerLogin() {
      const hp = document.getElementById("hp").value.trim();
      const plat = document.getElementById("plat").value.trim();

      if (!hp || !plat) {
        alert("Nomor HP dan plat kendaraan wajib diisi");
        return;
      }

      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            google.script.run
              .withSuccessHandler(function(url) {
                window.top.location.href = url + "?page=customer";
              })
              .getWebAppUrl();
          } else {
            alert("Data customer tidak ditemukan.");
          }
        })
        .withFailureHandler(function(error) {
          alert("Error login customer: " + error.message);
        })
        .loginCustomer(hp, plat);
    }
  </script>

</body>
</html>
