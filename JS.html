<script>
let selectedCustomerId = "";
let selectedVehicleId = "";


function showAdmin() {
  const form = document.getElementById("form");

  form.innerHTML = `
    <div class="form-box">
      <h3>Login Admin</h3>
      <p class="form-desc">Masuk menggunakan akun admin workshop.</p>

      <label>Username</label>
      <input id="adminUser" type="text" placeholder="Masukkan username">

      <label>Password</label>
      <input id="adminPass" type="password" placeholder="Masukkan password">

      <button class="btn full-btn" onclick="adminLogin()">
        Masuk sebagai Admin
      </button>
    </div>
  `;
}

function showCustomer() {
  const form = document.getElementById("form");

  form.innerHTML = `
    <div class="form-box">
      <h3>Login Customer</h3>
      <p class="form-desc">Cek riwayat servis kendaraan kamu.</p>

      <label>Nomor HP</label>
      <input id="hp" type="text" placeholder="Contoh: 08123456789">

      <label>Plat Nomor</label>
      <input id="plat" type="text" placeholder="Contoh: AD4557DH">

      <button class="btn full-btn" onclick="customerLogin()">
        Masuk sebagai Customer
      </button>
    </div>
  `;
}

function adminLogin() {
  const username = document.getElementById("adminUser").value.trim();
  const password = document.getElementById("adminPass").value.trim();

  if (!username || !password) {
    alert("Username dan password wajib diisi");
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        google.script.run
          .withSuccessHandler(function(url) {
            window.top.location.href = url + "?page=admin";
          })
          .getWebAppUrl();
      } else {
        alert("Login admin gagal. Username atau password salah.");
      }
    })
    .withFailureHandler(function(error) {
      alert("Error login admin: " + error.message);
    })
    .loginAdmin(username, password);
}

function customerLogin() {
  const hp = document.getElementById("hp").value.trim();
  const plat = document.getElementById("plat").value.trim();

  if (!hp || !plat) {
    alert("Nomor HP dan plat kendaraan wajib diisi");
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        google.script.run
          .withSuccessHandler(function(url) {
            window.top.location.href = url + "?page=customer";
          })
          .getWebAppUrl();
      } else {
        alert("Data customer tidak ditemukan.");
      }
    })
    .withFailureHandler(function(error) {
      alert("Error login customer: " + error.message);
    })
    .loginCustomer(hp, plat);
}


function loadCustomerDashboard() {
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data) {
        document.getElementById("customerCard").innerHTML =
          "<p>Data customer tidak ditemukan.</p>";
        return;
      }

      document.getElementById("customerCard").innerHTML = `
        <h3>${data.nama}</h3>
        <p>${data.kendaraan}</p>
        <p>${data.tipe}</p>
        <p>${data.plat}</p>
      `;
    })
    .withFailureHandler(function(error) {
      alert("Error memuat dashboard customer: " + error.message);
    })
    .getCustomerDashboard();
}

function loadCustomers() {
  google.script.run
    .withSuccessHandler(function(data) {
      let html = "";

      for (let i = 1; i < data.length; i++) {
        html += `
          <div class="card">
            <b>${data[i][1]}</b>
            <br>
            ${data[i][2]}
          </div>
        `;
      }

      document.getElementById("customerList").innerHTML = html;
    })
    .withFailureHandler(function(error) {
      alert("Error memuat data customer: " + error.message);
    })
    .getCustomers();
}

function addSparepartRow() {
  const div = document.createElement("div");

  div.innerHTML = `
    <input class="spNama" placeholder="Nama Sparepart">
    <input class="spQty" type="number" placeholder="Qty">
    <input class="spHarga" type="number" placeholder="Harga">
  `;

  document.getElementById("sparepartList").appendChild(div);
}

function saveServiceForm() {
  const items = [];

  document.querySelectorAll(".spNama").forEach((el, index) => {
    const qty = document.querySelectorAll(".spQty")[index].value;
    const harga = document.querySelectorAll(".spHarga")[index].value;

    items.push({
      nama: el.value,
      qty: Number(qty),
      harga: Number(harga),
      subtotal: Number(qty) * Number(harga)
    });
  });

  const data = {
    customerId: selectedCustomerId,
    vehicleId: selectedVehicleId,
    km: document.getElementById("km").value,
    keluhan: document.getElementById("keluhan").value,
    diagnosa: document.getElementById("diagnosa").value,
    mekanik: document.getElementById("mekanik").value,
    jasa: document.getElementById("jasa").value,
    items: items
  };

  google.script.run
    .withSuccessHandler(function() {
      alert("Servis berhasil disimpan");
    })
    .withFailureHandler(function(error) {
      alert("Error simpan servis: " + error.message);
    })
    .saveService(data);
}

function searchCustomer() {
  const keyword = document.getElementById("searchCustomer").value;

  google.script.run
    .withSuccessHandler(function(data) {
      let html = "";

      data.forEach(c => {
        html += `
          <div class="card">
            <b>${c.nama}</b>
            <br>
            ${c.hp}
            <br><br>

            <button class="btn" onclick="selectCustomer('${c.customerId}')">
              Pilih
            </button>
          </div>
        `;
      });

      document.getElementById("customerResult").innerHTML = html;
    })
    .withFailureHandler(function(error) {
      alert("Error mencari customer: " + error.message);
    })
    .searchCustomers(keyword);
}

function selectCustomer(customerId) {
  selectedCustomerId = customerId;

  google.script.run
    .withSuccessHandler(function(data) {
      let html = "<h3>Pilih Kendaraan</h3>";

      data.forEach(v => {
        html += `
          <div class="card">
            ${v.merk} ${v.tipe}
            <br>
            ${v.noPolisi}
            <br><br>

            <button class="btn" onclick="selectVehicle('${v.vehicleId}')">
              Pilih Kendaraan
            </button>
          </div>
        `;
      });

      document.getElementById("vehicleSection").innerHTML = html;
    })
    .withFailureHandler(function(error) {
      alert("Error memuat kendaraan: " + error.message);
    })
    .getVehiclesByCustomer(customerId);
}

function selectVehicle(vehicleId) {
  selectedVehicleId = vehicleId;
  alert("Kendaraan dipilih");
}

//Daftar Pelanggan
function showAddCustomerForm() {
  document.getElementById("adminContent").innerHTML = `
    <button class="btn btn-secondary" onclick="showAdminHome()">← Kembali</button>

    <h3>Daftar Pelanggan</h3>

    <input id="namaCustomer" placeholder="Nama pelanggan">

    <input id="hpCustomer" placeholder="Nomor HP">

    <input id="alamatCustomer" placeholder="Alamat">

    <h3>Data Kendaraan</h3>

    <input id="merkKendaraan" placeholder="Merk kendaraan">

    <input id="tipeKendaraan" placeholder="Tipe kendaraan">

    <input id="platKendaraan" placeholder="Plat nomor">

    <button class="btn" onclick="saveCustomerAndVehicle()">
      Simpan Pelanggan
    </button>
  `;
}

//Simpan Pelanggan
function saveCustomerAndVehicle() {
  const data = {
    nama: document.getElementById("namaCustomer").value,
    hp: document.getElementById("hpCustomer").value,
    alamat: document.getElementById("alamatCustomer").value,
    merk: document.getElementById("merkKendaraan").value,
    tipe: document.getElementById("tipeKendaraan").value,
    plat: document.getElementById("platKendaraan").value
  };

  if (!data.nama || !data.hp || !data.plat) {
    alert("Nama, nomor HP, dan plat kendaraan wajib diisi");
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      alert("Pelanggan berhasil disimpan");
      showAdminHome();
    })
    .withFailureHandler(function(error) {
      alert("Gagal menyimpan pelanggan: " + error.message);
    })
    .addCustomerWithVehicle(data);
}

//Menu Kendaraan

function logoutApp() {
  google.script.run

let selectedCustomerId = "";
let selectedVehicleId = "";

function initCustomerDashboard() {
  loadCustomerDashboard();
  loadCustomerInvoices();
}

function formatDateClient(dateValue) {
  const d = new Date(dateValue);
  if (isNaN(d)) return "-";

  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const yy = String(d.getFullYear()).slice(-2);

  return `${dd}/${mm}/${yy}`;
}

function formatRupiah(value) {
  return "Rp " + Number(value || 0).toLocaleString("id-ID");
}

function logoutApp() {
  google.script.run
    .withSuccessHandler(function() {
      google.script.run
        .withSuccessHandler(function(url) {
          window.top.location.href = url;
        })
        .getWebAppUrl();
    })
    .logout();
}

function loadCustomerDashboard() {
  google.script.run
    .withSuccessHandler(function(data) {
      document.getElementById("customerCard").innerHTML = `
        <h3>${data.nama}</h3>
        <p><b>Merk:</b> ${data.kendaraan}</p>
        <p><b>Tipe:</b> ${data.tipe}</p>
        <p><b>Plat:</b> ${data.plat}</p>
      `;
    })
    .withFailureHandler(function(error) {
      alert("Gagal memuat dashboard customer: " + error.message);
    })
    .getCustomerDashboard();
}

function loadCustomerInvoices() {
  google.script.run
    .withSuccessHandler(function(data) {
      let html = "";

      if (!data || data.length === 0) {
        html = `<p>Belum ada invoice servis.</p>`;
      } else {
        data.forEach(inv => {
          html += `
            <div class="invoice-item" onclick="showInvoiceDetail('${inv.serviceId}')">
              <div>
                <div class="invoice-title">Invoice Servis</div>
                <div class="invoice-subtitle">Tanggal dibuat: ${formatDateClient(inv.tanggal)}</div>
              </div>
              <div class="invoice-total">${formatRupiah(inv.totalBiaya)}</div>
            </div>
          `;
        });
      }

      document.getElementById("invoiceList").innerHTML = html;
    })
    .withFailureHandler(function(error) {
      alert("Gagal memuat invoice: " + error.message);
    })
    .getCustomerInvoices();
}

function showInvoiceDetail(serviceId) {
  google.script.run
    .withSuccessHandler(function(data) {
      let sparepartRows = "";

      data.items.forEach(item => {
        sparepartRows += `
          <tr>
            <td>${item.nama}</td>
            <td>${item.qty}</td>
            <td>${formatRupiah(item.harga)}</td>
            <td>${formatRupiah(item.subtotal)}</td>
          </tr>
        `;
      });

      document.getElementById("invoiceDetailContainer").innerHTML = `
        <div class="card invoice-detail-card">
          <div class="invoice-header-modern">
            <div>
              <h3>Invoice Servis</h3>
              <p>Tanggal dibuat: ${data.tanggalFormat}</p>
            </div>
            <button class="btn" onclick="exportInvoicePdf('${data.serviceId}')">
              Export PDF
            </button>
          </div>

          <div class="invoice-section">
            <h4>Informasi Bengkel</h4>
            <p><b>Nama Bengkel:</b> ${data.namaBengkel}</p>
            <p><b>Tanggal:</b> ${data.tanggalFormat}</p>
          </div>

          <div class="invoice-section">
            <h4>Informasi Pelanggan</h4>
            <p><b>Nama Pelanggan:</b> ${data.namaPelanggan}</p>
            <p><b>Plat:</b> ${data.plat}</p>
            <p><b>Merk:</b> ${data.merk}</p>
            <p><b>Tipe:</b> ${data.tipe}</p>
          </div>

          <div class="invoice-section">
            <h4>Detail Servis</h4>
            <p><b>KM:</b> ${data.km}</p>
            <p><b>Keluhan:</b> ${data.keluhan}</p>
            <p><b>Diagnosa:</b> ${data.diagnosa}</p>
            <p><b>Mekanik:</b> ${data.mekanik}</p>
          </div>

          <div class="invoice-section">
            <h4>Rincian Pengeluaran</h4>
            <table class="invoice-table">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Qty</th>
                  <th>Harga</th>
                  <th>Subtotal</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Jasa Servis</td>
                  <td>1</td>
                  <td>${formatRupiah(data.jasa)}</td>
                  <td>${formatRupiah(data.jasa)}</td>
                </tr>
                ${sparepartRows}
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="3"><b>Total Sparepart</b></td>
                  <td><b>${formatRupiah(data.totalSparepart)}</b></td>
                </tr>
                <tr>
                  <td colspan="3"><b>Total Biaya</b></td>
                  <td><b>${formatRupiah(data.totalBiaya)}</b></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      `;
    })
    .withFailureHandler(function(error) {
      alert("Gagal memuat detail invoice: " + error.message);
    })
    .getInvoiceDetail(serviceId);
}

function exportInvoicePdf(serviceId) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        window.open(res.url, "_blank");
      } else {
        alert("Gagal export PDF");
      }
    })
    .withFailureHandler(function(error) {
      alert("Error export PDF: " + error.message);
    })
    .createInvoicePdf(serviceId);
}

  return dd + "/" + mm + "/" + yy;

        data.forEach(inv => {

      alert("Gagal memuat invoice: " + error.message);
    })
    .getCustomerInvoices();
}

function initAdminDashboard() {

}

function setActiveMenu(button) {
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  if (button) {
    button.classList.add("active");
  }
}

function setPage(title, subtitle) {
  document.getElementById("pageTitle").innerText = title;
  document.getElementById("pageSubtitle").innerText = subtitle;
}

function formatRupiah(value) {
  return "Rp " + Number(value || 0).toLocaleString("id-ID");
}

  document.getElementById("adminContent").innerHTML = `

      <div class="stat-card">

        <div>
          <p>Total Pelanggan</p>
          <h2 id="statCustomers">-</h2>
        </div>
      </div>

      <div class="stat-card">

function showCustomerMenu(button) {
  setActiveMenu(button);
  setPage("Pelanggan", "Kelola dan cari data pelanggan.");

  document.getElementById("adminContent").innerHTML = `
    <div class="modern-card">
      <div class="section-header">
        <div>
          <h3>Data Pelanggan</h3>
          <p>Cari pelanggan berdasarkan nama atau nomor HP.</p>
        </div>

        <button class="btn small-btn" onclick="showAddCustomerForm()">
          + Tambah
        </button>
      </div>

      <div class="search-row">
        <input id="searchCustomer" placeholder="Cari nama / nomor HP">
        <button class="btn" onclick="searchCustomer()">Cari</button>
      </div>

      <div id="customerResult" class="result-grid"></div>
    </div>
  `;

  loadAllCustomers();
}

function loadAllCustomers() {
  google.script.run
    .withSuccessHandler(function(data) {
      renderCustomerResult(data);
    })
    .withFailureHandler(function(error) {
      alert("Gagal memuat pelanggan: " + error.message);
    })
    .getCustomerCards();
}

function searchCustomer() {
  const keyword = document.getElementById("searchCustomer").value;

  google.script.run
    .withSuccessHandler(function(data) {
      renderCustomerResult(data);
    })
    .withFailureHandler(function(error) {
      alert("Gagal mencari pelanggan: " + error.message);
    })
    .searchCustomers(keyword);
}

function renderCustomerResult(data) {
  let html = "";

  if (!data || data.length === 0) {
    html = `<p class="empty-text">Data pelanggan tidak ditemukan.</p>`;
  } else {
    data.forEach(c => {
      html += `
        <div class="data-card">
          <h3>${c.nama}</h3>
          <p>📱 ${c.hp}</p>
          <p>📍 ${c.alamat || "-"}</p>

          <button class="btn small-btn" onclick="selectCustomer('${c.customerId}')">
            Pilih Pelanggan
          </button>
        </div>
      `;
    });
  }

  document.getElementById("customerResult").innerHTML = html;
}

function showAddCustomerForm() {
  setPage("Tambah Pelanggan", "Daftarkan pelanggan dan kendaraan baru.");

  document.getElementById("adminContent").innerHTML = `
    <div class="modern-card form-card">
      <h3>Data Pelanggan</h3>

      <label>Nama Pelanggan</label>
      <input id="namaCustomer" placeholder="Contoh: Vicky">

      <label>Nomor HP</label>
      <input id="hpCustomer" placeholder="Contoh: 08123456789">

      <label>Alamat</label>
      <input id="alamatCustomer" placeholder="Alamat pelanggan">

      <h3 class="form-section-title">Data Kendaraan</h3>

      <label>Merk</label>
      <input id="merkKendaraan" placeholder="Contoh: Yamaha">

      <label>Tipe</label>
      <input id="tipeKendaraan" placeholder="Contoh: Mio">

      <label>Plat Nomor</label>
      <input id="platKendaraan" placeholder="Contoh: AD4557DH">

      <div class="form-actions">
        <button class="btn secondary-btn" onclick="showAdminHome()">
          Batal
        </button>

        <button class="btn" onclick="saveCustomerAndVehicle()">
          Simpan Pelanggan
        </button>
      </div>
    </div>
  `;
}

function saveCustomerAndVehicle() {
  const data = {
    nama: document.getElementById("namaCustomer").value.trim(),
    hp: document.getElementById("hpCustomer").value.trim(),
    alamat: document.getElementById("alamatCustomer").value.trim(),
    merk: document.getElementById("merkKendaraan").value.trim(),
    tipe: document.getElementById("tipeKendaraan").value.trim(),
    plat: document.getElementById("platKendaraan").value.trim()
  };

  if (!data.nama || !data.hp || !data.plat) {
    alert("Nama, nomor HP, dan plat kendaraan wajib diisi.");
    return;
  }

  google.script.run
    .withSuccessHandler(function() {
      alert("Pelanggan berhasil disimpan.");
      showCustomerMenu();
    })
    .withFailureHandler(function(error) {
      alert("Gagal menyimpan pelanggan: " + error.message);
    })
    .addCustomerWithVehicle(data);
}

function showVehicleMenu(button) {
  setActiveMenu(button);
  setPage("Kendaraan", "Kelola kendaraan berdasarkan pelanggan.");

  document.getElementById("adminContent").innerHTML = `
    <div class="modern-card">
      <h3>Cari Pelanggan</h3>
      <p>Pilih pelanggan untuk melihat kendaraan.</p>

      <div class="search-row">
        <input id="searchCustomer" placeholder="Cari pelanggan">
        <button class="btn" onclick="searchCustomerForVehicle()">Cari</button>
      </div>

      <div id="customerResult" class="result-grid"></div>
      <div id="vehicleSection"></div>
    </div>
  `;
}

function searchCustomerForVehicle() {
  const keyword = document.getElementById("searchCustomer").value;

  google.script.run
    .withSuccessHandler(function(data) {
      let html = "";

      if (!data || data.length === 0) {
        html = `<p class="empty-text">Pelanggan tidak ditemukan.</p>`;
      } else {
        data.forEach(c => {
          html += `
            <div class="data-card">
              <h3>${c.nama}</h3>
              <p>📱 ${c.hp}</p>

              <button class="btn small-btn" onclick="selectCustomer('${c.customerId}')">
                Lihat Kendaraan
              </button>
            </div>
          `;
        });
      }

      document.getElementById("customerResult").innerHTML = html;
    })
    .searchCustomers(keyword);
}

function selectCustomer(customerId) {
  selectedCustomerId = customerId;

  google.script.run
    .withSuccessHandler(function(data) {
      let html = `
        <div class="modern-card inner-card">
          <h3>Daftar Kendaraan</h3>
      `;

      if (!data || data.length === 0) {
        html += `<p class="empty-text">Belum ada kendaraan.</p>`;
      } else {
        data.forEach(v => {
          html += `
            <div class="vehicle-card">
              <div>
                <h4>${v.merk} ${v.tipe}</h4>
                <p>Plat: ${v.noPolisi}</p>
              </div>

              <button class="btn small-btn" onclick="selectVehicle('${v.vehicleId}')">
                Pilih
              </button>
            </div>
          `;
        });
      }

      html += `</div>`;

      document.getElementById("vehicleSection").innerHTML = html;
    })
    .withFailureHandler(function(error) {
      alert("Gagal memuat kendaraan: " + error.message);
    })
    .getVehiclesByCustomer(customerId);
}

function selectVehicle(vehicleId) {
  selectedVehicleId = vehicleId;
  alert("Kendaraan dipilih.");
}

function showServiceMenu(button) {
  setActiveMenu(button);
  setPage("Input Servis", "Buat invoice servis baru.");

  selectedCustomerId = "";
  selectedVehicleId = "";

  document.getElementById("adminContent").innerHTML = `
    <div class="modern-card">
      <h3>Pilih Pelanggan & Kendaraan</h3>

      <div class="search-row">
        <input id="searchCustomer" placeholder="Cari pelanggan">
        <button class="btn" onclick="searchCustomerForService()">Cari</button>
      </div>

      <div id="customerResult" class="result-grid"></div>
      <div id="vehicleSection"></div>
    </div>

    <div class="modern-card form-card">
      <h3>Detail Servis</h3>

      <label>KM Kendaraan</label>
      <input id="km" placeholder="Contoh: 12500">

      <label>Keluhan</label>
      <textarea id="keluhan" placeholder="Keluhan pelanggan"></textarea>

      <label>Diagnosa</label>
      <textarea id="diagnosa" placeholder="Hasil diagnosa"></textarea>

      <label>Mekanik</label>
      <input id="mekanik" placeholder="Nama mekanik">

      <label>Biaya Jasa</label>
      <input id="jasa" type="number" placeholder="Contoh: 50000">

      <h3 class="form-section-title">Sparepart</h3>

      <div id="sparepartList"></div>

      <button class="btn secondary-btn" onclick="addSparepartRow()">
        + Tambah Sparepart
      </button>

      <button class="btn full-btn" onclick="saveServiceForm()">
        Simpan Servis
      </button>
    </div>
  `;

  addSparepartRow();
}

function searchCustomerForService() {
  const keyword = document.getElementById("searchCustomer").value;

  google.script.run
    .withSuccessHandler(function(data) {
      let html = "";

      if (!data || data.length === 0) {
        html = `<p class="empty-text">Pelanggan tidak ditemukan.</p>`;
      } else {
        data.forEach(c => {
          html += `
            <div class="data-card">
              <h3>${c.nama}</h3>
              <p>📱 ${c.hp}</p>

              <button class="btn small-btn" onclick="selectCustomer('${c.customerId}')">
                Pilih Pelanggan
              </button>
            </div>
          `;
        });
      }

      document.getElementById("customerResult").innerHTML = html;
    })
    .searchCustomers(keyword);
}

function addSparepartRow() {
  const div = document.createElement("div");
  div.className = "sparepart-row";

  div.innerHTML = `
    <input class="spNama" placeholder="Nama sparepart">
    <input class="spQty" type="number" placeholder="Qty">
    <input class="spHarga" type="number" placeholder="Harga">
    <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
  `;

  document.getElementById("sparepartList").appendChild(div);
}

function saveServiceForm() {
  if (!selectedCustomerId || !selectedVehicleId) {
    alert("Pilih pelanggan dan kendaraan terlebih dahulu.");
    return;
  }

  const items = [];

  document.querySelectorAll(".spNama").forEach((el, index) => {
    const nama = el.value.trim();
    const qty = Number(document.querySelectorAll(".spQty")[index].value || 0);
    const harga = Number(document.querySelectorAll(".spHarga")[index].value || 0);

    if (nama && qty > 0 && harga >= 0) {
      items.push({
        nama: nama,
        qty: qty,
        harga: harga,
        subtotal: qty * harga
      });
    }
  });

  const data = {
    customerId: selectedCustomerId,
    vehicleId: selectedVehicleId,
    km: document.getElementById("km").value,
    keluhan: document.getElementById("keluhan").value,
    diagnosa: document.getElementById("diagnosa").value,
    mekanik: document.getElementById("mekanik").value,
    jasa: document.getElementById("jasa").value,
    items: items
  };

  google.script.run
    .withSuccessHandler(function(serviceId) {
      alert("Servis berhasil disimpan.");
      showAdminHome();
    })
    .withFailureHandler(function(error) {
      alert("Gagal menyimpan servis: " + error.message);
    })
    .saveService(data);
}

function showReminderMenu(button) {
  setActiveMenu(button);
  setPage("Reminder", "Fitur pengingat servis berikutnya.");

  document.getElementById("adminContent").innerHTML = `
    <div class="modern-card">
      <h3>Reminder Servis</h3>
      <p>Menu ini bisa dipakai untuk menampilkan daftar customer yang perlu servis ulang.</p>
      <p class="empty-text">Fitur lanjutan bisa ditambahkan setelah data reminder siap.</p>
    </div>
  `;
}

function logoutApp() {
  google.script.run
    .withSuccessHandler(function() {
      google.script.run
        .withSuccessHandler(function(url) {
          window.top.location.href = url;
        })
        .getWebAppUrl();
    })
    .logout();
}
