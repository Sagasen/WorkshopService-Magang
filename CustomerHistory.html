<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
  </head>
  <body>
    
<div class="container">

<h2>Riwayat Servis</h2>

<div id="historyList">

Loading...

</div>

</div>

<script>

google.script.run
.withSuccessHandler(
function(data){

 let html = "";

 data.forEach(row=>{

   html += `

   <div class="card">

   ${row.tanggal}

   <br>

   KM :
   ${row.km}

   <br>

   Total :
   Rp
   ${row.total}

   <br><br>

   <button
   class="btn"
   onclick="showDetail(
   '${row.serviceId}'
   )">

   Detail

   </button>

   </div>

   `;

 });

 document
 .getElementById(
 "historyList"
 )
 .innerHTML = html;

})
.getMyServices();

</script>

  </body>
</html>
